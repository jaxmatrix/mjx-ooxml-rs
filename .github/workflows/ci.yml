name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  lint-test:
    name: fmt · clippy · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: test
        run: cargo test --workspace

  # Enforce a clean, complete rustdoc build (missing docs are already denied via clippy; this also
  # catches broken intra-doc links, which clippy does not).
  docs:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: "-D warnings -D rustdoc::broken_intra_doc_links -D rustdoc::private_intra_doc_links"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: doc
        run: cargo doc --workspace --no-deps

  # The Phase-2 exit gate: a .pptx we construct actually opens in a real Office implementation.
  # Kept separate from lint-test so the heavy LibreOffice install cannot slow or flake the fast lane.
  # MJX_REQUIRE_SOFFICE=1 turns a missing binary into a hard failure, so this coverage can never
  # silently skip in CI (locally the same test skips cleanly when LibreOffice is absent).
  office-open:
    name: office-open (LibreOffice)
    runs-on: ubuntu-latest
    env:
      MJX_REQUIRE_SOFFICE: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install LibreOffice Impress
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice-impress
      - name: office-open canary
        run: cargo test -p mjx-pptx --test office_open

  # Prove the shipped library graph cross-compiles cleanly to mobile / wasm / desktop.
  # xtask is a host-only dev tool (schema codegen), so it is excluded from cross builds.
  cross-build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { target: wasm32-unknown-unknown, os: ubuntu-latest }
          - { target: aarch64-linux-android,  os: ubuntu-latest }
          - { target: x86_64-pc-windows-msvc, os: windows-latest }
          - { target: aarch64-apple-ios,      os: macos-latest }
          - { target: aarch64-apple-darwin,   os: macos-latest }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: build (lib graph)
        run: cargo build --workspace --exclude xtask --target ${{ matrix.target }}
